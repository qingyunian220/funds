<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化基金排名</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 16px;
            background-color: #1e9fff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        
        .btn:hover {
            background-color: #0c80df;
        }
        
        .btn-secondary {
            background-color: #666;
        }
        
        .btn-secondary:hover {
            background-color: #555;
        }
        
        .card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
        }
        
        .card-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h2 {
            font-size: 16px;
            color: #333;
        }
        
        .card-body {
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid #eee;
            vertical-align: middle;
        }
        
        th {
            background-color: #f8f8f8;
            color: #666;
            font-weight: 600;
            white-space: nowrap;
        }
        
        tr:hover {
            background-color: #fafafa;
        }
        
        .positive-number {
            color: #ff5722;
            font-weight: 500;
        }
        
        .negative-number {
            color: #16b777;
            font-weight: 500;
        }
        
        a.fund-link {
            color: #1e9fff;
            text-decoration: none;
        }
        
        a.fund-link:hover {
            text-decoration: underline;
        }
        
        .mini-chart {
            width: 180px;
            height: 50px;
            display: inline-block;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .pagination button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: #1e9fff;
            color: #1e9fff;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .page-info {
            color: #666;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <a href="/" class="btn btn-secondary">← 返回首页</a>
            </div>
            <h1>量化基金排名</h1>
            <div></div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2>基金列表</h2>
                <button id="screenshotBtn" class="btn">
                    <span>📸</span> 截图保存
                </button>
            </div>
            <div class="card-body" id="screenshot-area">
                <div id="table-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allData = [];
        
        // 页面加载时获取数据
        $(document).ready(function() {
            loadData();
        });
        
        // 加载数据
        function loadData() {
            $.ajax({
                url: '/get_quant_fund_data',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response && response.code === 0 && response.data) {
                        allData = response.data;
                        renderTable();
                    } else {
                        $('#table-container').html('<div class="loading">数据加载失败</div>');
                    }
                },
                error: function() {
                    $('#table-container').html('<div class="loading">数据加载失败</div>');
                }
            });
        }
        
        // 渲染表格
        function renderTable() {
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>基金代码</th>
                            <th>基金简称</th>
                            <th>近1月超额</th>
                            <th>近3月超额</th>
                            <th>近6月超额</th>
                            <th>近1年超额</th>
                            <th>成立时间</th>
                            <th>最新规模</th>
                            <th>换手率</th>
                            <th>前10大重仓股占比</th>
                            <th>持股行业集中度</th>
                            <th>管理总规模</th>
                            <th>超额收益曲线</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            allData.forEach(function(row, index) {
                html += `<tr>`;
                html += `<td>${index + 1}</td>`;
                html += `<td><a href="https://fund.eastmoney.com/${row['基金代码']}.html" target="_blank" class="fund-link">${row['基金代码']}</a></td>`;
                html += `<td>${row['基金简称'] || ''}</td>`;
                // html += `<td>${formatPercent(row['近1月'])}</td>`;
                // html += `<td>${formatPercent(row['近3月'])}</td>`;
                // html += `<td>${formatPercent(row['近6月'])}</td>`;
                // html += `<td>${formatPercent(row['近1年'])}</td>`;
                html += `<td>${formatPercent(row['近1月超额'])}</td>`;
                html += `<td>${formatPercent(row['近3月超额'])}</td>`;
                html += `<td>${formatPercent(row['近6月超额'])}</td>`;
                html += `<td>${formatPercent(row['近1年超额'])}</td>`;
                html += `<td>${row['成立时间'] || ''}</td>`;
                html += `<td>${row['最新规模'] || ''}</td>`;
                html += `<td>${row['换手率'] || ''}</td>`;
                html += `<td>${row['前10大重仓股占比'] || ''}</td>`;
                html += `<td>${formatIndustryConcentration(row['持股行业集中度'])}</td>`;
                html += `<td>${row['管理总规模'] || ''}</td>`;
                html += `<td><div id="mini-chart-${row['基金代码']}" class="mini-chart" data-fund-code="${row['基金代码']}"></div></td>`;
                html += `</tr>`;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            $('#table-container').html(html);
            
            // 延迟渲染迷你图
            setTimeout(function() {
                renderMiniCharts(allData);
            }, 100);
        }
        
        // 格式化百分比
        function formatPercent(value) {
            if (value === null || value === undefined || value === '') {
                return '';
            }
            const num = parseFloat(value);
            if (isNaN(num)) {
                return value;
            }
            const formatted = num.toFixed(2) + '%';
            if (num < 0) {
                return `<span class="negative-number">${formatted}</span>`;
            } else if (num > 0) {
                return `<span class="positive-number">${formatted}</span>`;
            }
            return formatted;
        }
        
        // 格式化行业集中度
        function formatIndustryConcentration(value) {
            if (!value) return '';
            const match = String(value).match(/(\d+\.\d+)%/);
            if (match && match[1]) {
                return match[1] + '%';
            }
            return value;
        }
        
        // 渲染迷你图
        function renderMiniCharts(pageData) {
            console.log("=== 开始渲染迷你图 ===");
            console.log("需要渲染的基金数量:", pageData.length);
            
            pageData.forEach(function(row, index) {
                const fundCode = row['基金代码'];
                const chartId = `mini-chart-${fundCode}`;
                const chartDom = document.getElementById(chartId);
                
                if (!chartDom) {
                    console.log(`[${index}] 找不到DOM元素: ${chartId}`);
                    return;
                }
                
                // 如果图表已经存在，先销毁它
                if (chartDom._echarts_instance_) {
                    console.log(`[${index}] 销毁旧图表: ${chartId}`);
                    chartDom._echarts_instance_.dispose();
                    chartDom._echarts_instance_ = null;
                }
                
                console.log(`[${index}] 开始加载数据: ${fundCode}`);
                
                // 获取数据，添加时间戳防止缓存
                $.ajax({
                    url: `/get_excess_curve/${fundCode}?t=${Date.now()}`,
                    type: 'GET',
                    dataType: 'json',
                    cache: false,
                    success: function(response) {
                        console.log(`[${index}] ${fundCode} 数据返回:`, response);
                        
                        if (response && response.code === 0 && response.data && Array.isArray(response.data) && response.data.length > 0) {
                            const data = response.data;
                            const dates = data.map(item => item.date);
                            const returns = data.map(item => item.excess_return * 100);
                            
                            console.log(`[${index}] ${fundCode} 解析结果: ${dates.length}个点`);
                            console.log(`[${index}] ${fundCode} 前3个点:`, returns.slice(0, 3));
                            console.log(`[${index}] ${fundCode} 后3个点:`, returns.slice(-3));
                            
                            const lastValue = returns.length > 0 ? returns[returns.length - 1] : 0;
                            const lineColor = lastValue >= 0 ? '#ff5722' : '#16b777';
                            
                            console.log(`[${index}] ${fundCode} 最终超额: ${lastValue.toFixed(2)}%, 颜色: ${lineColor}`);
                            
                            const myChart = echarts.init(chartDom);
                            
                            const option = {
                                animation: false,
                                grid: {
                                    left: 0,
                                    right: 0,
                                    top: 0,
                                    bottom: 0
                                },
                                xAxis: {
                                    type: 'category',
                                    data: dates,
                                    show: false,
                                    boundaryGap: false
                                },
                                yAxis: {
                                    type: 'value',
                                    show: false,
                                    scale: true,
                                    min: 'dataMin',
                                    max: 'dataMax'
                                },
                                series: [{
                                    data: returns,
                                    type: 'line',
                                    smooth: 0.2,
                                    symbol: 'none',
                                    lineStyle: {
                                        color: lineColor,
                                        width: 1.2
                                    },
                                    areaStyle: {
                                        color: {
                                            type: 'linear',
                                            x: 0,
                                            y: 0,
                                            x2: 0,
                                            y2: 1,
                                            colorStops: [{
                                                offset: 0,
                                                color: lineColor + '25'
                                            }, {
                                                offset: 1,
                                                color: lineColor + '08'
                                            }]
                                        }
                                    }
                                }]
                            };
                            
                            myChart.setOption(option, true); // 强制不合并
                            chartDom._echarts_instance_ = myChart;
                            console.log(`[${index}] ${fundCode} 图表渲染完成`);
                        } else {
                            console.log(`[${index}] ${fundCode} 数据为空，不渲染图表`);
                            // 清空容器
                            chartDom.innerHTML = '';
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error(`[${index}] ${fundCode} 请求失败:`, error);
                        chartDom.innerHTML = '';
                    }
                });
            });
        }
        
        // 截图功能
        $('#screenshotBtn').on('click', function() {
            const btn = $(this);
            const originalText = btn.html();
            btn.html('<span>⏳</span> 正在截图...');
            btn.attr('disabled', true);
            
            const element = document.getElementById('screenshot-area');
            
            html2canvas(element, {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff'
            }).then(function(canvas) {
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                link.download = '量化基金排名_' + timestamp + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.html(originalText);
                btn.attr('disabled', false);
                
                alert('截图保存成功！');
            }).catch(function(error) {
                console.error('截图失败:', error);
                btn.html(originalText);
                btn.attr('disabled', false);
                alert('截图失败，请重试');
            });
        });
    </script>
</body>
</html>
